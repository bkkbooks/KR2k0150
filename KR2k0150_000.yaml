body:
  text: 坤輿圖說地理類十外紀之屬提要臣等謹案坤輿圖說二卷國朝南懷仁撰懷仁西洋人康熙中官欽天監監正是書上卷自坤輿至人物分十五條皆言地之所生下卷載海外諸國道里山川民風物産分為五大州而終之以西洋七竒圖說大致與艾儒略職方外紀互相出入而亦時有詳略異同案東方朔神異經曰東南大荒之中有朴父焉夫婦並髙千里腹圍案此下當有腹圍之里數原本脫佚今姑仍之自輔天初立時使其夫婦𨗳開百川懶不用意謫之並立東南不飲不食不畏寒暑須黃河清當復使其夫婦𨗳護百川云云此書所載自銅人跨海而立巨舶往來出其胯下者似影附此語而作又考神異經曰北方層冰萬里厚百丈有磎鼠在冰下土中焉形如鼠肉重千斤可以作脯食之已熱云云此書記此物全與相合又周密癸辛雜識曰西域有沙海正據要津其水熱如湯不可向近此天之所以限華夏也終古未嘗通中國忽一夕有巨獸浮水窒其骨長數十里橫于兩涘如津梁然骨中有髓竅可容並馬于是西域之地始通中國其國謀往來者每以膏油塗其骨懼其枯朽折則無復可通故耳云云此書記此事亦全與相合疑其東來以後得見中國古書因依仿而變幻其說不必皆有實跡然核以諸書所記賈舶之所傳聞亦有厯厯不誣者蓋雖有所粉飾而不盡虛搆存廣異聞亦無不可也乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:fc5a770a21dc8b5da3447d855dbe4359e4ab819248839becf726602814e8a7aa
