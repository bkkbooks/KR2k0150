body:
  text: 坤輿圖說卷下欽天監監正南懷仁撰亞細亞州亞細亞天下一大州人類肇生聖賢首出其界南至蘇門荅喇吕宋等島北至新增白臘及北海東至日本島大清海西至大乃河墨阿的湖大海西紅海小西洋國土不啻百餘大者首推中國此外曰韃而靼曰回回曰印第亞曰莫卧爾曰百兒西亞曰度兒格曰如徳亞俱此州巨邦海中有大島曰則意蘭曰蘇門荅喇曰爪哇曰渤泥曰吕宋曰木路各更有地中海諸島亦屬此州界内中國則居其東南自古帝王聖哲聲名文物禮樂衣冠逺近所宗山川土俗物産朝貢諸國詳載省志諸書不贅西北有回回諸國人多習武亦有好學好禮者初宗馬哈黙之教諸國多同後各立門户互相排擊地産牛羊馬畜極多因不啖豕諸國無豕莫卧爾印度有五惟南印度仍其舊餘四印度皆為莫卧爾所併其國甚廣分十四道象三千餘嘗攻西印度其王統兵五十萬馬十五萬象二百毎象負一木臺容人二十載銃千門大者四門毎門駕牛二百盛載金銀五十巨罌以禦不勝盡為莫卧爾王所獲東印度有大河名安日謂經此水浴作罪悉得消除五印度人咸徃沐浴東近滿喇加國各人奉四元行之一死後各用本行𦵏其屍奉土者入土奉水火者投水火奉氣者懸尸于􅆰中最西有名邦曰如徳亞其國史書載上古事蹟極詳自初生人類至今六千餘年世代相傳及分散時候萬事萬物造作原始悉記無訛因造物主降生是邦故人稱為聖土春秋時有二聖王父逹味徳子撒喇滿造一天主堂皆金玉砌成飾以珍寳窮極美麗費以三十萬萬王徳盛智高聲聞最逺中國謂西方有聖人疑即指此古名大秦唐貞觀中曽以經像来賔有景教流行碑刻可考如徳亞之西有國名逹馬斯谷産絲綿羢罽顔料極佳城不用磚石是一活樹糾結甚厚無隙高峻不可攀登天下所未有印第亞印第亞即天竺五印度在印度河左右人面紫色善百工技巧無筆札以錐畫樹葉為書國王例不世及以姊妹子為嗣親子給禄自膳男不衣衣以尺布掩臍下女以布纒首至足其俗士農工商各世其業最貴曰婆羅門次曰乃勒奉佛多設齋醮今沿海諸國率奉天主正教其地有加得山中分南北南半山川氣候鳥獸魚蟲草木各極詭異立夏至秋分無日不雨反是則酷暑難堪惟有凉風解之自巳至申從海西来自亥至寅從陸東来草木異常者難屈指所産木造舟極堅不破壞多生椰樹幹可造舟車葉可覆屋實能療饑漿止渇可為酒醋為油為飴糖可削為釘殻盛飲瓤索綯有二竒木一名隂樹花形如茉莉晝不開夜始放晨盡落國人好卧于下花覆滿身一木不花而實不可食枝飄揚下垂附地生根若柱嵗久結成巨林無異屋宇有容千人者樹中近原幹處以供佛名菩薩樹有巨鳥吻能解百毒一吻直金錢五十象異他種能識人言或命負物至某處徃輙不爽他國象遇之則蹲伏有獸名獨角能解毒此地多毒蛇蛇飲泉水染毒人獸飲之必死百獸雖渇不敢飲俟此獸来以角攪其水毒遂解百獸始就飲又有獸形如牛大如象生兩角一在鼻上一在頂背皮甲甚堅交接處如鎧甲頭大尾短居水中可數十日從小豢之亦可馭百獸俱慴伏值象與馬必逐殺之骨肉皮角牙糞皆為藥西洋貴重之其猫有肉翅能飛蝙蝠大如猫地勢三角形末銳處濶不百步東西氣候各極相反此晴則彼雨此寒則彼熱此風濤蔽天彼穏平如地海舶乗順風過者至銳處行如拔山比南印度尤異百兒西亞印度河西有大國曰百兒西亞幅􅊷甚廣都城百二十門乗馬疾馳一日未能周有一苑囿造於空際下以石柱擎之上承土石樓臺池沼草木鳥獸畢具大踰一邑國王嘗建一臺以所殺敵人頭纍之㡬五萬國主好獵一圍獲鹿三萬聚其角為臺今尚存東近撒馬兒罕界一塔以黄金鑄成上頂一金剛石如胡桃光夜照十五里河江極大有一河發水水所及處生各種名花百兒西亞西北諸國皆為度兒格所併内有國亞喇北亞土産金銀多寳石地在二海中氣候常和一嵗再熟有樹如橡栗夜露墜其上即凝為蜜晨取食極甘美産百物俱豐古稱福土其地有沙海廣二千餘里沙乗大風如浪行旅過此偶為沙浪所壓倏忽成丘山凡欲渡者以羅經定方向測道里備糧糗及兼旬之水乗駱駝駝行甚疾日馳四五百里又耐渇一飲可度五六日其腹容水甚多客或乏水則剖駝飲其腹中水度兒格之西北納多理亞國有山多瓊石國人徃鑿之至一石穴見石人無筭皆昔時避亂之民穴居于此死後為寒氣所凝漸化為石又有地名際剌産異羊羊羢輕細雨中衣之不沾濡漬以油毫不汚染有山生草木皆香過之香氣馥郁襲人衣裾韃而靼中國之北迤西一帶直抵歐邏巴東界俱名韃而靼江河絶少平土多沙大半皆山大者曰意貎中分亞細亞之南北其北皆韃而靼種氣候極寒冬月無雨入夏㣲寒僅濕土人性好勇以病歿為辱少城郭居室駕屋于車以便遷徙産牛羊駱駝嗜馬肉以馬頭為絶品貴者方得噉之道行饑渇即刺所乗馬瀝血而飲嗜酒以一醉為榮國俗大都如此更有殊異不倫夜行晝伏身䝉鹿皮喜食蛇蟻蜘蛛者有人身羊足氣候極寒夏月層氷二尺有長人善躍一躍三丈履水如行陸迤西舊有女國曰亞馬作搦最驍勇善戰嘗破一名都曰厄弗俗其地建一神祠宏麗竒巧非思議所及國俗惟春月容男子一至其地生子男輙殺之今為他國所併存其名耳又有地曰得白得不以金銀為幣止用珊瑚至大剛國惟屑樹皮為錢印王號其上當幣其俗國王死徃𦵏逢人輙殺謬謂死者可事其主則意蘭印第亞之南有則意蘭島人自幼以環繫耳漸垂至肩而止海中多珍珠江河生猫睛昔泥紅金剛石等山林多桂皮香木亦産水晶嘗琢成棺斂死者相傳為中國人所居今房屋殿宇亦頗相類西有小島總名馬兒地襪不下數千悉為人所居海中生一椰樹其實甚小可療諸病蘇門荅喇蘇門荅喇島至濕熱人至其地者多病君長不一産金甚多及産銅鐵錫諸色染料有大山油泉可取為油多沉香龍腦金銀香椒桂人強武恒與敵國相攻殺多海獸海魚時登岸傷人其東北滿喇加國地不甚廣為海商輻輳正在赤道下春秋二分氣候極熱賴無日不雨故可居産象及胡椒佳果木終嵗不絶人良善不事生業或彈琵琶閒㳺爪哇爪哇大小有二俱在蘇門荅喇東南海島各有主多象無馬騾産香料蘇木象牙不用錢以胡椒及布為貨幣人奸宄兇急好作魘魅妖術諸國毎治兵争白象白象所在即為盟主渤泥渤泥島在赤道下出片腦極佳燃火沉水中火不滅直焚至盡有獸名巴雜爾似羊鹿其腹内生一石能療百病極貴重至百換國王藉以為利吕宋廣州之東南為吕宋其地産鷹鷹王飛則衆鷹從之或得禽獸俟鷹王先取其睛然後羣鷹方啖其肉又有一樹百獸不得近一過其下即斃矣木路各吕宋之南有木路各無五谷出沙谷米是一木磨粉而成産丁香胡椒二樹天下所無惟本處折枝挿地即活性最熱祛濕氣與水酒同貯即吸乾樹旁不生草土人欲除草折其枝插地草即立槁又産異羊牝牡皆有乳有大龜一殻可容一人或用為盾以禦敵日本日本乃海内一大島長三千二百里寛不過六百里今有六十六州各有國主俗尚強力雖有總王權常在強臣其民多習武少習文土産銀鐵好漆其王生子年三十以王讓之其國大抵不重寳石只重金銀及古窑器阿爾母斯阿爾母斯其地悉是鹽及硫磺草木不生鳥獸絶迹人著皮履遇雨過履底一日輙敗多地震氣候極熱須坐卧水中沒至口方解絶無淡水勺水皆從海外載至因居三大州之中富商大賈多聚此地百貨駢集人烟輻輳凡海内珍竒難致之物輙徃取之地中海諸島亞細亞之地中海有島百千其大者曰哥阿島昔國人盡患疫有名醫依卜加得不用藥療令城内外遍舉大火燒一晝夜火息病愈盖疫為邪氣所侵火氣猛烈盪滌諸邪邪盡疾愈乃至理一曰羅得島天氣常清明終嵗見曰嘗鑄一鉅銅人高三十丈海中築兩臺盛其足風帆直過跨下一指可容一人直立掌托銅盤夜燃火以照行海鑄十二年乃成後地震而頺運其銅以九百駱駝徃載一曰祭波里島物産極豐毎嵗國賦至百萬葡萄酒極美可度八十年出火浣布煉石而成非他物也歐邏巴州天下第二大州名曰歐邏巴南至地中海北至青地及氷海東至大乃河墨阿的湖大海西至大西洋共七十餘國其大者曰以西把尼亞曰拂郎察曰意大里亞曰熱爾瑪尼亞曰拂蘭地亞曰波羅泥亞曰翁加里亞曰大泥亞曰雪際亞曰諾勿惹亞曰厄勒祭亞曰莫斯哥未亞其地中海有甘的亞諸島西海有意而蘭大諳厄利亞諸島凡大小諸國自國王以及庶民皆奉天主聖教纎毫異學不容竄入國王互為婚姻世相和好財用百物有無相通不私封殖其婚娶男子大約三十女子至二十外臨時議婚不預聘通國皆一夫一婦無有二色者土多肥饒産五穀以麥為重果實更繁出五金以金銀銅鑄錢為幣衣服蚕絲者有天鵝羢織金縀之屬羊羢者有毯罽鎖哈喇之屬又有利諾草為布細而堅輕而滑敝可搗為紙極堅靭君臣冠服各有差等相見以免冠為禮男子二十以上槩衣青色兵士勿論女人以金寳為飾服御羅綺佩帶諸香至四十及未四十而寡者即屛去衣素衣酒以葡萄釀成不雜他物可積至數十年膏油之類味美者曰阿利襪是樹頭果熟後全為油國俗多酒㑹客不勸酒偶犯一醉終身以為辱飲食用金銀玻璃及磁器其屋有三等最上者純以石砌其次磚為墻柱木為棟梁其下土為墻木為梁柱石屋磚屋築基最深上累六七層髙至十餘丈瓦或用鉛或輕石板或陶瓦磚石屋歴千年不壊墻厚而實冬不寒夏不溽其工作製造備極精巧其駕車國王用八馬大臣六馬其次四馬或二馬乗載騾馬驢互用戰馬皆用牡騸過則弱不堪戰矣諸國皆尚文學國王廣設學校一國一郡有大學中學一邑一鄉有小學小學選學行之士為師中學大學又選學行最優之士為師生徒多者至數萬人其小學曰文科有四種一古賢明訓一各國史書一各種詩文一文章議論學者自七八嵗學至十七八學成本學師儒試之優者進于中學曰理科有三家初年學辨是非之法二年學察性理之道三年學察性理以上之學學成本學師儒又試之優者進于大學乃分為四科聽人自擇一曰道科主興教化一曰教科主守教法一曰治科主習政事一曰醫科主療疾病皆學數年而後成學成師儒又嚴考閲之一師問難畢又輪一師一人遍應諸師之問如是取中便許任事學道者専務化民不與國事治民者秩滿後國王遣官察其政績㢘得其實以告于王而黜陟之凡四科官禄入皆厚養亷有餘尚能推惠貧乏絶無交賄行賂等情諸國所讀之書皆古聖賢撰著一以天主經典為宗即後賢有作必合大道益人心乃許流傳設檢書官經看詳定方准刋行毋容一字蠱人心壊風俗者諸國奉天主教皆愛天主萬物之上及愛人如已故國人俱喜施捨千餘年来未有因貧鬻子女者未有饑餓轉溝壑者在處皆有貧院専養一方鰥寡孤獨及殘疾之人又有幼院専育小兒凡貧者無力養贍送至院院墻穴設有轉盤内外不相見扣墻則院中人轉兒入異日父母復欲収養按所入之年月便得其子又有病院大城多至數十所有中下院處中下人有大人院處貴人凡貴人若羇旅若使客偶患疾病則入此院倍美于常屋所需藥物悉有主者掌之預備名醫診視復有衣衾帷幔調䕶看守之人病愈而去貧者量給資斧此乃國王大家所立或城中併力而成月輪一大貴人總領其事各城邑遇豐年多積米麥饑嵗以常價糶之人遇道中遺物或獸畜之類必覔其主還之弗得主則置之公所聽失者来取如符合即送復國中有天理堂選盛徳宏才無求于世者主之凡國家大舉動大征伐必先質問合天理否以為可然後行諸國賦稅不過十分之一民皆自輸無徵比催科之法詞訟極簡小事里中和解大事乃聞官官設三堂先訴第三堂不服告第二堂又不服告第一堂終不服上之國堂經此堂判後人無不聽理凡官府判事不先事加刑必俟事明罪定招認允服然後刑之吏胥餼廩亦出于詞訟但因事大小多寡立有定例刋布署前不能多取故官無恃勢剥奪吏胥無舞文詐害封内絶無戰鬬其有邪教異國恃強侵侮不可徳訓本國除常設兵政外復有世族英賢智勇兼備者數千人結為義㑹以保國䕶民初入㑹時試果不憚諸艱方始聽入遇警則鳩集成師一可當十必能滅冦成功以西把尼亞歐邏巴之極西曰以西把尼亞周一萬二千五百里世稱天下萬國相連一處者中國為冠若分散于他域者以西把尼亞為冠其地三面環海一面臨山産駿馬五金絲綿細羢白糖國人好學有共學二所逺近學者聚焉國中有二大名城一曰色未利亞近地中海為亞墨利加諸舶所聚金銀如土竒物無數多阿利襪果有一林長五百里者一名多勒多城在山巔運水甚艱巧者製一水器盤水至城不賴人力其器晝夜自能轉動又有渾天象其大如屋人入其中見各重天之運動其度數皆與天合境内有河曰寡第亞納㐲流地中百餘里穹窿若橋梁其上為牧塲畜牛羊無算國中天主堂雖多有一創建極美在多勒多城金寳祭器數千有精巧銀殿髙丈餘濶丈許内復有小金殿髙數尺其工費又多于本殿金銀之數近来國王又造一大堂髙大竒巧無比修道之士環居内有三十六祭臺中臺左右有編簫二座中各有三十二層毎層百管管各一音合三千餘管凡風雨波濤嘔吟戰鬬與百鳥之聲皆可模倣以西把尼亞屬國大者二十餘中下共百餘本國之西有波爾杜瓦國都城有得若大河入海四方商舶皆聚為歐邏巴總㑹之地産果實絲棉極美水族亦繁出葡萄酒最佳過海至中國不壞國中共學二所其講學名賢經國王所聘雖已輟講亦終身給禄歐邏巴高士多出此學又有一地界兩河周圍七百里天主堂一千四百八十所水泉二萬五千石橋二百通海大市六處隨處立有仁㑹遍恤孤寡㷀獨國王復遣官専撫孤子歐邏巴初通海道周經利未亞過大浪山抵小西洋至中國貿易者從此國始拂郎察以西把尼亞東北為拂郎察周一萬一千二百里分十六道屬國五十都城名把理斯設一共學生徒嘗四萬餘併他方學共七所又設社院以教貧士一切供億皆王主之中古一類斯聖王惡回回佔如徳亞地興兵伐之始製大銃其國在歐邏巴内回回遂稱西土人為弗郎機銃亦沿此名是國之王天主特寵自古迄今皆賜一神能以手撫人癧瘡應手而愈毎嵗一日療人先期齋戒三日凡患此疾者預集天主殿中國王舉手撫之祝曰王者撫汝天主救汝撫百人百人愈撫千人千人愈其神異如此國王元子别有土地供禄食他國不爾也國土膏腴物力豐富居民安逸有山出石藍色質脆可鋸為板當瓦覆屋國人性情温爽禮貎周全尚文好學意大理亞拂郎察東南為意大理亞周圍一萬五千里三面環地中海一面臨髙山地産豐厚物力十全四逺之人輻輳于此舊有一千一百六十六郡最大者曰羅瑪古為總王之都歐邏巴諸國皆臣服焉城周一百五十里地有大渠穿出城外百里以入于海四方商舶悉輸珍寳駢集是渠教王居于此以代天主在世主教皆不婚娶永無世及但憑盛徳輔弼大臣公推其一而立焉列國之王雖非其臣咸致敬盡禮稱為聖父神師認為代天主教之君也凡有大事莫决必請命焉其左右簡列國才全徳備或即王侯至戚五六十人分領教事羅瑪城竒觀甚多宰輔家有一名苑中造流觴曲水機巧異常有銅鑄各類羣鳥遇機一發自能鼔翼而鳴各具本類之聲有一編簫但置水中機動則鳴其音甚妙又有髙大渾全石柱外周鏤古王形像故事爛然可觀内則􅆰虚可容數人登隮上下如塔然聖伯多禄殿用精石製造花素竒巧可容五六萬人殿高處視在下人如孩童城中有大山曰瑪山人烟稠密苦無泉造一高梁長六十里梁上立溝接逺山之水如通流河有水泉其味與乳無異西北為勿搦祭亞無國王世家共推一有功徳者為主城建海中有一種木為樁入水千年不朽其上鋪石造屋備極精美城内街衢俱是海兩旁可通陸行城中有艘二萬又有橋梁極濶上列三街俱有民居不異城市其髙可下度風帆國中精于造舟預庀物料一舟指顧可成造玻璃極佳甲于天下有勿里諾湖在山巔從石峡㵼下聲如迅雷聞五十里日光耀之恍惚皆虹霓状又有沸泉温泉沸泉常沸高丈餘不可染指投畜物于内頃刻便糜爛温泉女子或浴或飲不生育者生育育者多乳所産鐵鑛掘盡踰二十五年復生在本土任加火力終不鎔之他所則鎔其南為納波里地極豐厚有火山晝夜出火爆石彈射他方至百里外後移一聖人遺蜕至本國其害遂息又地名哥生濟亞有兩河一河濯髪則黄濯絲則白一河濯絲髪皆黒外有博樂業城昔二大家争為竒事一家造一方塔高出雲表以為無可踰一家亦建一塔與前塔齊第彼塔直聳此則斜倚若傾今歴數百年未壊直聳者反将頽又有城名把都亞中有公堂縱二百步横六十步上為樓鉛瓦中間無一柱又把兒瑪一堂廣可馳馬亦無一柱惟以梁如人字相倚尋丈至盈尺皆然上壓愈重下挺持愈堅從納波里至左里城石山相隔國人穴山通道長四五里廣容兩車對視如明星又有地出火四周皆小山山洞甚多入内可療病各主一疾如欲汗者入某洞則汗至欲去濕者入某洞則濕去意大理亞名島有三一西齊里亞地極富庶亦有大山噴火山四周多草木積雪不消常成晶石沸泉如醋物入便黒國人最慧善談論最精天文造日晷法自此地始有巧工徳大禄者造百鳥能飛即㣲如蠅蟲亦能飛更有天文師名亞而㡬墨得者有三絶昔敵國駕數百艘臨其島彼則鑄一巨鏡映日注射敵艘光照火發數百艘一時燒盡又其王命造一極大舶舶成将下海雖傾一國之力用牛馬駱駝千萬莫能運㡬墨得營運巧法第一舉手舟如山岳轉動須㬰下海又造一自動渾天儀十二重層層相間七政各有本動凡日月五星列宿運行遲疾與天無二以玻璃為之重重可透視旁近有瑪兒島不生毒物蛇蝎等皆不螫人毒物自外至輙死一哥而西加有三十三城産犬能戰一犬可當一騎其國布陣一騎間一犬反有騎不如犬者又近熱奴亞一雞島滿島皆雞自生自育絶非野雉之屬熱爾瑪尼亞拂郎察東北有國曰熱爾瑪尼亞國王不世及乃七大屬國之君所共推者或用本國臣或用列國君須請命教王立之國中設共學十九所冬月極冷善造煖室㣲火温之遂煖土人散處各國為兵極忠實至死不貳各國䕶衛宫城或從征他國皆選此國人充之工作精巧制器匪夷所思能於戒指内納一自鳴鐘多水澤氷堅後用一種木屐兩足躡之一足立氷上一足從後撃乗滑勢一激數丈其行甚速手中尚不廢常業又有法蘭哥地人最質直易信行旅過者輙詈之客或不荅則大喜延入具酒食謂此人已經嘗試可信托也多葡萄善造酒但沽與他方過客土人滴酒不入口即他國載酒至不容入境其屬國名波夜米亞者地生金掘井恒得金塊有重十餘斤河底常有金如豆粒有羅得林日亞國最侈汰其王一延客堂四周皆列珊瑚瑯玕交錯儼一屛障有一大銃製作極巧二刻間連發四十次拂蘭地亞亞勒馬尼亞西南為拂蘭地亞地不甚廣人居稠密有大城二百八十小城六千三百六十八共學三所一學分二十餘院人樂易温良好談論婦人貿易無異男子其性貞潔能手作錯金絨不煩機杼布最輕細皆出此地波羅泥亞亞勒瑪泥亞東北曰波羅泥亞地豐厚多平衍皆蜜林採之不盡産鹽味極厚光如晶其人美秀和樸禮賔篤備絶無盜賊國王不傳子聽大臣擇立賢君世守國法不變分毫亦有立子者須王在位時預擬非預擬不得立國中分為四區區居三月一年而徧地甚冷冬月海凍行旅于冰上歴㡬晝夜望星而行其屬國波多理亞地易發生種一嵗有三嵗之獲草菜三日便長五六尺海濵出琥珀是海底脂膏從石隙流出初如油天熱浮海面見風始凝天寒出隙便凝毎為大風衝至海濵翁加里亞翁加里亞在波羅泥亞南物産極豐牛羊可供歐邏巴一州之用有四水甚竒其一從地中噴出即凝為石其一冬月常流至夏反合為氷其一以鐵投之便如泥再鎔又成精銅其一水色沉綠凍則便成綠石永不化大泥亞諸國歐邏巴西北有四大國曰大泥亞曰諾而勿惹亞曰雪際亞曰鄂底亞與熱爾瑪泥亞相隔一海套道阻難通其南夏至日長六十九刻其中長八十二刻其北夏至日輪横行地面半年為一晝夜地多山林産獸及海魚極大其大泥亞國沿海産菽麥牛羊最多牛輸徃他國嵗常五萬海中魚蔽水面舟為魚擁輙不能行不藉網罟隨手取之不盡本國一世家名第谷建一臺于高山絶頂以窮天象究心三十餘年累黍不爽所制窺天之器窮極要𣺌今為西土厯法之宗其諾而勿惹亞寡五穀山林多材木鳥獸海多魚鼈人性馴厚喜接逺方賔旅昔時過客僑居者不索物價今稍需即饜足其地絶無盜賊雪際亞地分七道屬國十二歐邏巴北稱第一富庶多五穀五金財貨百物貿易不以金銀以物相抵人好勇亦善遇逺方人鄂底亞在雪際亞之南亦繁庶厄勒祭亞厄勒祭亞在歐邏巴極南地分四道凡禮樂法度文字典籍皆為西土之宗至今古經尚循其文字所出聖賢及博物窮理者後先接踵今為回回擾亂漸不如前其人喜啖水族不嘗肉味亦嗜美酒東北有羅馬泥亞國都城周裹三層生齒極衆城外居民綿亘二百五十里一聖女殿門開三百六十以象周天附近有高山名阿零薄山頂終嵗清明無風雨有河水一名亞施亞白羊飲之變黒一名亞馬諾黒羊飲之變白有二島一為厄歐白亞海潮一日七次一為哥而府圍六百里出酒與油蜜極美遍島皆橘柚香櫞之屬更無别樹天氣清和野鳥不至莫斯哥未亞亞細亞西北盡境有大國曰莫斯哥未亞東西萬五千里南北八千里中分十六道有窩兒加河最大支河八十皆為尾閭以七十餘口入北高海兵力甚強日事吞併其地夜長晝短冬至日止二時氣候極寒雪下堅凝行旅駕車度雪中馬疾如飛室宇多用火温行旅為嚴寒所侵血脉皆凍如驀入温室耳鼻輙墮毎自外来者先以水浸其軀俟僵體漸甦方可入温室八月至四月皆衣皮裘多獸皮如狐貉貂鼠之屬一裘或至千金者熊皮為卧褥永絶蟣虱産皮處用以充賦稅國多盜畜猛犬噬之晝置穽中夜聞鐘聲始放人亟匿影閉户矣今亦稍信天主真教其王常手持十字俗最澆凡貿易須假托外邦商賈方取信國人若言本土則逆其詐有大鐘搖非三十人不可惟國王即位及誕日鳴之所造大銃長三丈七尺用藥二石内容二人掃除又有密林其樹悉為蜂房國人各界其樹為恒産地中海諸島地中海有島百千其大者曰甘的亞周二千三百里古王造一􅁐囿路徑交錯一入不能出㳺者以物識地然後可入生一草名阿力滿能療饑地中海風浪至冬極大難行有鳥名亞爾爵虐作巢于水次一嵗一乳自卵至翼不過半月此半月海必平静無風波商舶待之以渡海西北海諸島歐邏巴西海迤北一帶至氷海海島極大曰諳厄利亞曰意而蘭大其外小島不下千百意而蘭大氣候極和夏熱不擇隂冬寒不需火産獸畜最多絶無毒物有一湖挿木于内入土一段化成鐵水中一段化成石出水面方為原木旁一小島島中一地洞常出怪異之形諳厄利亞氣候融和地方廣大分三道共學二所共三十院有怪石能阻聲長七丈高二丈隔石發大銃不聞名聾石有湖長百五十里廣五十里中容三十小島有三竒事一竒魚味甚佳皆無鰭翅二竒天静無風倐起大浪舟楫遇之無不破三竒一小島無根因風移動人弗敢居草木極茂孳息牛羊豕類極多近有一地死者不殮移尸于山千嵗不朽子孫亦能認識地無鼠有從海舟来者至此遂死又有三湖細流相通其魚不相徃来此水魚誤入彼水輙死旁有海窖潮盛時吸其水永不盈潮退噴水如山高當吸水時人立其側衣沾水即隨水吸入窖中如不沾衣雖近立亦無害迤北一帶海島極多至冬夜長行路工作皆以燈産貂類甚繁皆以為衣又有人長大多力遍體生毛牛羊鹿最衆犬最猛烈可殺虎遇獅亦不避冬月海氷為風所撃湧積如山山多鳥獸水多魚鼈以魚肉為糧或磨成麫油燃燈骨造舟車屋室皮可作船遇風不沉不破陸走負之而行海風甚猛拔樹折屋攝人物于他所又有小島其人飲酒不醉年壽最長近諳厄利亞國為格落蘭得其地多火以磚石障之仍可居或宛轉作溝通火火焰所至便置釜甑熟物不須薪火亦終古不滅利未亞州天下第三大州曰利未亞南至大浪山北至地中海東至西紅海聖老楞佐島西至阿則亞諾海大小共百餘國其地中多曠野野獸最盛有極堅好文彩之木能入水土千年不朽迤北近海諸國最豐饒五穀一嵗再熟毎種一斗可収十石穀熟時外國百鳥皆至其地避寒就食渉冬始歸故秋末冬初近海諸地獵取禽鳥無筭産葡萄樹極高大生實繁衍他國所無地既曠野人或無常居毎種一熟即移徙他處野地皆産異獸因其處水泉絶少水之所瀦百獸聚焉毎異類相合輙産竒形怪狀之獸有鳥名亞既刺乃百鳥之王羽毛黄黒色高二三尺首有冠鉤喙如鷹隼飛極高巢于峻山石穴生子令視日目不瞬者乃留壽最長久老者脫毛復生新羽性鷙猛能攫羊鹿百鳥食之肉經宿則不食冒險者尋其巢取其餘肉可供終嵗毒蛇能害其子其性有知覺則知先尋一種石置巢邉蛇毒遂解有山狸似麝臍後一肉囊香滿其中輙病向石上剔出始安香如蘇合油而黒能療耳病又産異羊甚鉅一尾便數十斤味最美毒蛇能殺人土人能制蛇者蛇至其前自能驅逐此等人世世子孫皆然尊貴人行路必覔此人相隨其地馬善走又猛能與虎鬬界内名山亞大辣者在西北此山最高凡風雨露雷皆在半山山頂終古晴明視日星倍大國人呼為天柱此方人夜睡無夢甚為竒有月山極險峻不可攀躋有獅山在西南境其上頻興雷電轟撃不絶不間寒暑其在曷噩剌國出銀鑛甚多取之不盡其在西南海曰大浪山海風迅急浪極大商舶至此不能過則退歸西洋破船率在此處過之則大喜可望登㟁此山而東嘗有暗礁全是珊瑚剛者利若鋒刃海船最畏避凡利未亞之國著者曰厄日多曰馬邏可曰弗撒曰亞費利加曰奴米第亞曰亞毘心域曰莫訥木大彼亞曰西爾得散處者曰井巴島曰聖多黙島意勒納島聖老楞佐島厄日多利未亞東北有大國曰厄日多自古有名極稱富厚中古時曽大豐七年繼即大歉七載天主教中前知聖人龠瑟者預令國人罄國中之財悉用積穀至荒時不惟救本國饑四方来糴財貨盡輸入其國故富厚無比今五穀極饒畜産最多他方百菓草木移至此地茂盛倍常其地千萬年無雨亦無雲氣國中有大河名曰泥琭河河水毎年一發自五月始以漸而長土人視水漲多少以為豐歉之候大率最大不過二丈一尺最小不過一丈五尺至一丈五尺則歉收二丈一尺則大有年凡水漲無過四十日其水中有膏腴水所極處膏腴即著土中又不泥濘故地極腴饒百穀草木俱暢茂當水盛時城郭多被淹沒國人于水未發前預杜門户移家于舟以避之去河逺處水亦不至昔國王求救旱澇得智巧士亞爾㡬墨得作一水器以時注洩便利無比即今龍尾車也國人極有機智好攻格物窮理之學又精天文因其地不雨併無雲霧日月星辰晝夜明朗故其考騐益精他國不如前好為滛祀繼有聖徒到彼化誨遂出聖賢甚多其國女人恒一乳生三四子天下騾不孳生惟此地騾能𫝊種國王嘗鑿數石臺非以石砌是擇大石如陵阜者剷削成下趾濶三百二十四步高二百七十五級級高四尺登臺頂極力逺射不能越臺趾有城曰該禄是古大國都城名聞西土其城有百門門高百尺皆用本處一種脂膏砌石成之堅緻無比街衢行三日始遍五百年前最為強盛善用象戰鄰國大小皆畏服屬國甚多今其國已廢城亦為大水衝撃齧其下土因而傾倒然此城雖不如舊尚有街長三十里悉為市肆行旅喧填百貨具集城中常有駱駝二三萬馬邏可弗撒亞非利加奴米第亞近地中海一帶為馬邏可與弗撒國馬邏可地分七道出獸皮羊皮極珍美蜜最多國人以蜜為糧其俗以冠為重非貴人老人不得加冠于首僅以尺寸蔽頂而已弗撒地亦分七道都城最大宫室殿宇極華整高宏有一殿周圍三里開三十門夜燃燈九百盞國人亦略識理義厄日多之西為亞非利加地肥饒易生一麥嘗秀三百四十一穗以此極為富厚馬邏可之南有國名奴米第亞人性獰惡不可教誨有果樹如棗可食其地有小利未亞乏水泉方千里無江河行旅過者須備兼旬之水亞毘心域莫訥木大彼亞利未亞東北近紅海其國甚多人皆黒色迤北稍白向南漸黒甚者如漆惟齒目極白其人有兩種一在利未亞東者名亞毘心域地方極大據本州三分之一從西紅海至月山皆其封域産五穀五金金不善鍊恒以生金塊易物糖蠟最多造燭純以蠟國中道不拾遺夜不閉户從無盜冦人極智慧崇奉天主正教修道者手持十字或掛胸前極敬愛西土多黙聖人為其傳道自彼始王行遊國中常有六千皮帳隨之僕從車徒恒滿五六十里一在利未亞南名莫訥木大彼亞國土最多皆極愚蠢不識理義氣候甚熱沿海皆沙人踐之即成瘡痏黒人坐卧其中安然無恙所居極穢喜食象肉亦食人皆生齕之齒皆銼銳若犬牙然奔走疾于馳馬不衣衣反笑人衣衣或塗油于身以為美樂無文字初歐邏巴人傳教至此黒人見其看誦經書大相驚訝以為書中有言語可傳逹其愚如此地無兵刃以木為標鎗火炙其銳處用之極銛利身有羶氣永不可除性不知憂慮聞簫管琴瑟諸樂音便起舞不止其性樸實耐久教為善事即盡力為之為人奴極忠于主為主用力視死如歸遇敵無避亦知天地有主但視其王若神靈凡隂晴旱澇皆徃祈之王若偶一噴涕舉朝舉國皆高聲應諾大可笑也近亦多有奉天主教者但性喜飲酒易醉産雞皆黒豕肉為天下第一美味病者食之無害産象極大一牙有重二百斤者有獸如猫名亞爾加里亞尾有汗極香穽于木籠汗沾于木乾之以刀削下便為竒香烏木黄金最多地無寸鐵特貴重之布帛喜紅色班色及玻璃器善浮水他國名為海鬼亞毘心域屬國名諳哥得者夜食不晝食止一飡不再食以鹽鐵為幣又一種名步冬頗知學重書籍善歌舞亦亞毘心域之類西爾得工鄂利未亞西有海濵國名西爾得地有兩大沙一在海中隨水游移不定一在地隨風飄泊所至積如丘山城郭田畝皆被壓沒國人苦之又有工鄂國地亦豐饒頗解義理自與西客徃来國中崇奉天主其王遣子徃歐邏巴習學文字講格物窮理之學井巴利未亞南有一種名曰井巴聚衆十餘萬極勇猛又善用兵無定居以馬駱駝乗載遷徙所至即食其人及鳥獸蟲蛇必生命盡絶乃轉他國為南方諸小國大害福島利未亞西北有七島福島其總名其地甚廣凡生人所需無不有絶無雨風氣滋潤易長草木百穀不煩耕種布種自生葡萄酒及白糖至多西舶徃来必到此島市物為舟中之用有一鐵島無泉水生一種大樹毎日沒有雲氣抱之釀成甘水滴下至明旦日出方雲散水歇樹下作數池一夜輙滿人畜皆沾足終古如此木島去路西大泥亞半月水程樹木茂翳地肥美路西大泥亞人至此焚之八年始盡今種葡萄釀酒絶佳聖多黙島意勒納島聖老楞佐島聖多黙島在利未亞西圍千里徑三百里濃隂多雨愈近日處雲愈重雨愈多此島之果俱無核又有意勒納島鳥獸果實甚繁絶無人居海舶從小西洋至大西洋者恒泊此十餘日樵採漁獵備二三萬里之用而去又赤道南有聖老楞佐島圍二萬餘里人多黒色散處林麓無定居出琥珀象牙極廣亞墨利加州亞墨利加第四大州總名也地分南北中有一峽相連峽南曰南亞墨利加南起墨瓦蠟泥海峽北至加納逹峽北曰北亞墨利加南起加納逹北至氷海東盡福島地極廣平分天下之半初僅知有亞細亞歐邏巴利未亞三大州至百年前西國大臣名閣龍者深于格物窮理又講習行海之法天主黙啓其衷一日行逰西海嗅海中氣味忽有省悟謂此乃土地之氣必有人烟國土奏聞國王資以舟航糧糗器具貨財将卒珍寳閣龍率衆出海輾轉數月危險生疾從人咸怨欲還閣龍志堅促令前行一日舶上望樓人大聲言有地衆共歡喜亟取道前行果至一地初未敢登岸因土人未嘗航舟不知海外有人物乍見海舶既大駕風帆迅疾發大砲如雷咸相詫異皆驚竄奔逸舟人無計與通偶一女子在近遺錦衣金寳玩好器具而歸明日其父母同衆来觀又與之寳貨土人大悅遂欵留西客與地作屋以便徃来閣龍命来人一半留彼一半還報國王致其物産明年國王又命載百穀百果種攜農師巧匠徃教其地人情益喜然猶滯在一隅其後又有亞墨利哥者至歐邏巴西南海尋得赤道以南大地即以其名名之故曰亞墨利加數年後又有一人名哥爾得斯國王仍賜海舶命徃西北尋訪復得大地在赤道以北即北亞墨利加其大國與歐邏巴饋遺相通西國王亦命掌教諸士至彼勸人為善數十年來相沿惡俗稍變其國在南亞墨利加者有白露伯西爾智加金加西臘南北相連處有宇加單加逹納在北亞墨利加者有墨是可花地新拂郎察瓦革了農地雞末臘新亞泥俺加里伏爾尼亞西北諸蠻方外有諸島總名亞墨利加島云南亞墨利加白露南亞墨利加西曰白露大小數十國廣袤一萬餘里中間平壤沃野亦一萬餘里地肥磽不一肥者不煩耕治布子自能生長五穀百果草木悉皆上品本土人目為大地苑囿其鳥獸之多羽毛麗聲音美亦天下第一地出金鑛取時金土互溷别之金多于土故金銀最多國王宫殿皆黄金為板飾之獨不産鐵兵器用燒木銛石今貿易相通漸知用鐵然至貴餘器物皆金銀銅三種為之有數國從来無雨地有濕性或資水澤有樹生脂膏極香烈名拔爾撒摩傅諸傷損一晝夜肌肉復合如故塗痘不瘢塗屍千餘年不朽一種異羊可當騾馬性甚倔強有時倒卧雖鞭䇿至死不起以好言慰之即起而走惟所使矣食物最少可絶食三四日肝生一物如卵能療諸病海商貴之天鵝鸚鵡尤多一鳥名厄馬最大長頸高足翼翎美麗不能飛足若牛蹄善奔走馬不能及卵可作杯器今畨舶所市龍卵即此物産綿花甚多亦織為布不甚用専易西洋布及利諾布或剪馬毛織為服江河極大有泉如脂膏常出不竭取燃燈或塗舟砌牆當油漆用有一種泉水出于石罅離數十歩即變為石有土能燃火平地山岡皆有之地震極多一郡一邑常有沉墊無遺或平地突起山阜或移山别地皆地震所為不敢為大宫室上盖薄板以備震壓其俗無文字書籍結繩為識或以五色状物形以當字即史書亦然算數用小石子亦精敏其文飾以珍寳篏面以金為環穿唇鼻臂腿或繋金鈴復飾重寳夜中光照一室其國都逹萬餘里鑿山平谷為坦途更布石以便驛使傳命數里一更三日夜可逹二千里人性良善不傲不飾詐頗似淳古風因其地多金銀任意可取故無竊盜貪吝但陋俗最多自歐邏巴天主教士人徃彼勸化教經典書文與談道徳理義徃時惡俗如殺人祭魔驅人殉𦵏等事俱不復然為善反力于諸國有捐軀不辭者其間有極醜惡地土産極薄人拾蟲蟻為糧以網四角掛樹而卧因地氣最濕又有毒蛇人犯必死不敢下卧恐寐時觸之土音各種不同有一正音可通萬里之外近一大國名亞老哥人強毅果敢善用弓矢及鐵杵不立文字一切政教號令皆口傳說辯論極精聞者最易感動凡出兵時大将戒諭兵士不過數言無不感激流涕願效死者他談論皆如此伯西爾南亞墨利加東有大國名伯西爾天氣融和人壽長無疾病他方病不能療者至此即瘳地甚肥饒江河為天下最大有大山界白露者甚高飛鳥莫能過産白糖最多嘉木種種不一蘇木更多亦稱蘇木國一獸名懶面甚猛爪如人指鬃如馬腹垂著地不能行盡一月不踰百步喜食樹葉縁樹取之亦須兩日下樹亦然無法可使速有獸前半類狸後半類狐人足梟耳腹下有房可張可合恒納其子于中欲乳方出其地之虎餓時百夫莫當值飽一人制之有餘即犬亦可斃之國人善射前矢中的後矢即破前筈連發數矢相接如貫無一失者俗多躶體獨婦人以髪蔽前後幼時鑿頤及下唇作孔以猫睛夜光諸寳石篏入為美婦人生子即起作務如常其夫坐蓐數十日服攝調養親戚俱来問候饋遺弓矢食物通國皆然地不産米麥不釀酒用草根晒乾磨麫作餅以當飰凡物皆公用不自私土人能居水中一二時刻張目明視亦有浮水最捷者恒追執大魚名都白狼而騎之以鐵鉤鉤魚目曵之東西走轉捕他魚素無君長書籍亦無衣冠散居聚落喜啖人肉近歐邏巴士人𫝊天主教到彼今已稍稍歸化頗成人理其南有銀河水味甘美湧溢平地水退布地皆銀沙銀粒河身最大入海處濶數百里海中五百里一𣲖尚為銀泉不入鹵味其北有大河名阿勒戀亦名馬良温河身曲折三萬里未得其源兩河俱為天下第一智加南亞墨利加之南為智加即長人國地方頗冷人長一丈許遍體皆毛昔時人更長大曾掘地得人齒濶三指長四指餘則全身可知其人好持弓矢矢長六尺毎握一矢挿入口中至沒羽以示勇男女以五色畫面為文飾金加西蠟南亞墨利加之北曰金加西蠟其地出金銀天下稱首鑛有四坑深者二百丈土人以牛皮造軟梯下之役者常三萬人所得金銀國王什取其一七日約得課銀三萬兩其山麓有城名銀城百物俱貴獨銀至賤貿易用銀錢五等大者八錢小至五分金錢四等大者十兩小者一兩歐邏巴自通道以来嵗嵗交易所獲金銀甚多故西土之金銀漸賤其南北地相連處名宇加單近赤道北十八度之下南北亞墨利加從此而通東西二大海從此而隔周圍五千餘里天主教未至其國預知敬十字聖架國俗以文身為飾北亞墨利加墨是可北亞墨利加國土多富饒鳥獸魚鼈極衆畜類更繁富家牧羊嘗至五六萬有屠牛萬餘僅取皮革餘悉棄不用百年前無馬今得西國馬種野中生馬甚衆最良有雞大于鵝羽毛華彩味最佳吻上有鼻可伸縮如象縮僅寸餘伸可五寸許諸國未通時地少五穀今亦漸饒斗種可収十石産良藥甚多其南總名新以西把尼亞内有大國墨是可屬國三十境内兩大湖甘鹹各一俱不通海鹹者水消長若海潮土人取以熬鹽甘者中多鱗介湖四面環山山多積雪人烟輻輳集于山下舊都城容三十萬家大率富饒安樂毎用兵與他國相争鄰國助兵十餘萬守都城恒用三十萬但囿于封域聞人言他方有大國土輙笑而不信今所建都城周四十八里不在地面直從大湖中創起堅木為樁密植湖中上加板以承城郭宫室其堅木名則獨鹿入水千年不朽城内街衢室屋皆宏敞精絶國王寳藏極多所重金銀鳥羽工人輯鳥毛為畫光彩生動國内初不知文字今能讀書肆中有鬻書其業大抵務農工以尊貴為長人面目美秀彼自言有四絶一馬二屋三街衢四相貎昔年土俗事魔殺人以祭或遭災亂毎嵗輙加祭法以緑石為山寘人背于上持石刀剖取人心以擲魔面肢體則分食之所殺人皆取于鄰國故頻年戰鬬不休今歐邏巴𫝊教士人感以天主愛人之心知事魔謬不復祭魔食人中有一大山山谷野人最勇猛一可當百善走如飛馬不能及又善射人發一矢彼發三矢百發百中亦喜啖人肉鑿人腦骨以為飾今漸習于善最喜得衣如商客與衣一襲則一嵗盡力為之防守迤北有墨古亞剛不過千里地極豐饒人強力多壽生一種嘉穀一嵗可三熟牛羊駱駝糖蜜絲布尤多更北有古里亞加納地苦貧人皆露卧漁獵為生有寡斯大人性良善亦以漁為業其地有山出二泉稠膩如脂膏一紅一墨色花地新拂郎察瓦革了農地北亞墨利加西南有花地富饒好戰不休不尚文事男女皆裸體僅以木葉或獸皮蔽前後間飾以金銀纓絡人皆牧鹿若牧羊然亦飲其乳有新拂郎察因西土拂郎察人所通故名地曠野多險峻稍生五穀土瘠民貧亦嗜人肉有瓦革了本魚名因海中産此魚甚多商販徃他國恒數千艘故以魚名其地土瘠人愚純沙不生五穀土人造魚腊時取魚頭數萬密布沙中毎頭種穀二三粒後魚腐地肥穀生暢茂収獲倍於常土有農地多崇山茂林屢出異獸人強力果敢搏獸取皮為裘亦為屋縁飾以金銀為環鉗項穿耳近海一大河濶五百里窮四千里不得其源如中國黄河雞未臘新亞泥俺加里伏爾泥亞北亞墨利加西為雞未臘為新亞泥俺為加里伏爾尼亞地勢相連國俗畧同男婦皆衣羽毛及虎豹熊羆等裘間以金銀飾之其地多大山一最大者高六七十里廣八百里長三四千里山下終嵗極熱山半温和山巔極冷頻年多雪盛時深六七尺雪消一望平濤數百里山出泉極大滙為大江數處皆廣數百里樹木茂盛參天蔽日松木腐爛者蜂就作房蜜瑩白味美採蜜者預次水邉候蜂来隨之去獲蜜甚多獨少鹽得之如寳相傳餂之不忍食獅象虎豹等獸成羣皮甚賤雉大者重十五六斤多雷電樹木恒被震壊有小鳥如雀於枯樹啄小孔千數毎孔藏一粟為冬月之儲西北諸蠻方北亞墨利加地愈北人愈野無城郭君長文字數家成一聚落四周以木栅為城其俗好飲酒日以仇殺為事即平居亦以鬬為戲以牛羊相賭凡壮男出戰一家老弱婦女咸持齋祈勝戰勝家人迎賀斷敵人頭築牆若再戰臨行其老人指牆上髑髏相勸勉其女人則砍其指骨連為身首之飾人肉三分之一祭所事魔神一賞戰功一給持齋助禱者若獲大仇削其骨二寸許鑿頤作孔以骨栽入露寸許于外用表其功頤有樹三骨者人咸敬畏戰時家中寳物皆攜去誓不反顧以期必勝其尚勇好殺如此盖由地本富饒人家星列無君長官府以理法斷其曲直故小小争競便相攻殺此地人多力女人亦然毎遷徙什物器皿糧糗子女共作一駝負之而行上下峻山如履平地坐則以右足為席男女皆飾髪為事首飾甚多亦帶螺貝等物男女皆垂耳環若傷觸其耳及環為大辱必反報之居屋卑隘門戸低皆以備敵昔年信魔持齋極䖍齋時絶不言語日僅食菽一握飲水一杯凡将與人攻戰或将漁獵耕穫或将喜樂宴飲或忽遇仇家者輙持齋各有日數耕者祀兎鹿求不傷稼獵者祭大鹿角以求多獲鹿角大者長五六尺徑五六寸有大鷙鳥所謂鳥王巫藏其乾腊一具亦以為神獵者祭之巫覡甚多凡祈晴雨于衆石中尋取一石彷彿似物形者以為神而祭之一日不騐即棄去别求一石偶值晴雨輙歸功焉近歐邏巴行教士人勸令敬事造物真主戒勿相殺勿食人遂翕然一變又強毅有恒心既改永不犯俗富足好施毎作熟食置門首任徃来者取之亞墨利加諸島兩亞墨利加之島不可勝數大者為小以西把尼亞為古巴為牙賣加等氣候多熱草木花實終嵗不斷産一異草食之殺人去其汁則甚美亦可為糧有毒木人過其影即死手持枝葉亦死覺中其毒亟沉水中可免有鳥夜張其翼則發大光可自照野猪猛獸縱横原野土人善走疾如奔馬又能負重足力竭後以鍼刺股出黒血少許則疾走如初取黄金一嵗限定㡬日又有一島女人善射甚勇猛生數嵗即割右乳以便弓矢昔商舶行近此島遇女子盪小舟来射殺商舶二人去如飛不可追逐更有一島土人言其泉水甚異於日未出時徃取其水洗面百遍老容可復少又有一島墨瓦蘭嘗過此不見人物謂曰無福島一珊瑚島以多生珊瑚樹故名有新為匿島甚大似利未亞之為匿故亦以為名墨瓦蠟泥加亦名瑪熱辣泥加天下第五大州曰墨瓦蠟泥加先閣龍諸人已覔得兩亞墨利加西土以西把尼亞國王復念地為圜體徂西自可逹東向至亞墨利加海道遂阻必有西行入海處于是選海舶舟師裹餱糧甲兵命一強力之臣墨瓦蘭者徃訪墨瓦蘭承命沿亞墨利加東偏紆迴數萬里輾轉經年人情厭斁輙思返國墨瓦蘭懼無以復命拔劍下令曰有言歸國者斬舟人震慴賈勇而前忽得海峽亘千餘里海南大地又恍一乾坤墨瓦蘭率衆廵行祗見平原漭蕩杳無涯際入夜燐火星流瀰漫山谷因命為火地他方或以鸚鵡名州者以其所産鸚鵡亦此大地之一隅謂墨瓦蘭開此區遂以其名命曰墨瓦蠟泥加墨瓦蘭既踰此峽入太平大海自西復東直抵亞細亞馬路古界度小西洋越利未亞大浪山而北折遵海還報本國遍遶大地一週四過赤道下歴地三十萬餘里從古航海未有若斯者名其舟為勝舶言戰勝風濤之險奏廵方偉功其人物風俗山川畜産鳥獸蟲魚俱無傳說即南極度數道里逺㡬何皆推步未周不漫述以俟後或有詳之者四海總說造物主化成天地四行包裹以漸而堅凝火最居上火包氣氣包水土則居于下是環地面皆水也造物主于是别地為高深而水盡行于地中與平土各得什五所瀦曰川曰湖曰海川則流湖則聚海則潮川與湖不過水之支𣲖海則衆流所鍾稱百谷王故說水必詳于海有二焉海在國之中國包海者曰地中海國在海之中海包國者曰寰海寰海極廣隨處異名或以洲域稱近亞細亞者謂亞細亞海近歐邏巴者謂歐邏巴海他如利未亞亞墨利加墨瓦蠟泥加及蕞爾小國皆可隨本地所稱或隨本地方隅命之在南者曰南海在北者謂北海東西亦然兹将中國列中央從大東洋至小東洋為東海從小西洋至大西洋為西海近墨瓦蠟泥一帶為南海近北極下為北海地中海附焉天下之水盡于此矣海状地心重濁水附于地到處就其濁心故地形圓水勢亦圓隔數百里水面便如橋梁登桅望之則見其前或夷或險但海中夷險各處不同惟太平海極淺亘古至今無大風浪大西洋極深深十餘里從大西洋至大清海四十五度以南其風常有定候至四十五度以北風色錯亂不常尤異者在大清海東南一隅有異風變亂凌雜倐忽更二十四向海舶任風而飄風水又各異道如前南風水必北行倐轉為北風水勢尚未趨南舟莫適從因至摧破小西洋海潮極高極迅急頃刻湧數百里海中大舶及蛟龍魚鼈乗潮勢湧入山中不可出歐邏巴新増蠟利未亞大浪山亦時起風浪險急至滿喇加海無風倐起浪又不全海皆然惟里許一處以次第興後浪将起前浪已息利未亞海近為匿亞之地當赤道下者常苦無風天氣酷熱舶至此食物俱壊人易生疾海深不得下碇舶大不能用櫓海水暗流及潮湧至淺處壊者多在于此至北海則半年無日氣候極寒而氷故曰氷海舶為氷堅所阻直守至氷解方得去又苦海中氷塊為風撃堆叠成山舶觸之定為虀粉凡海中色大率都緑惟東西二紅海色淡紅或云海底珊瑚所映亦非本色近小西洋一處入夜海水通明如火持器汲起滿器俱火光滴入掌中光亦瑩然可玩後漸消滅海族海族不可勝窮自鱗介外凡陸地走獸海中多有相似者魚族一名把勒亞身長數十丈首有二大孔噴水上出勢若懸河見海舶則昻首注水舶中頃刻水滿舟沉遇之者以盛酒鉅木甖投之連吞數甖俛首而逝淺處得之熬油可數千斤一魚名斯得白長二十五丈性最良能保䕶人或漁人為惡魚所困此魚徃鬬解漁人之厄故國法禁人捕之一名薄里波其色能隨物變如附土則土色附石如石色一名仁魚西書記此魚嘗負一小兒登岸偶以鬐觸傷兒兒死魚不勝悲痛亦觸石死西國取海豚嘗取仁魚為招毎呼仁魚入􅃠即入海豚亦與之俱俟豚入盡復呼仁魚出􅃠海豚悉羅一名劍魚嘴長丈許有齬刻如鋸猛而多力能與把勒魚戰海水皆紅此魚輙勝以嘴觸船則破海舶甚畏之一魚甚大長十餘丈濶丈餘目大二尺頭高八尺口在腹下有三十二齒齒皆徑尺頤骨亦長五六尺迅風起嘗衝至海涯一魚甚大有力海舶遇之其魚竟以頭尾抱舶兩頭舟人欲撃之恐一動舟必覆惟跪祈天主須㬰解去一如鱷魚名剌瓦而多長尾堅鱗甲刀劍不能入足有利爪鋸牙滿口性甚獰惡入水食魚登陸人畜無所擇百魚逺近皆避第其行甚遲小魚百種嘗隨之以避他魚吞啖生子初如鵞卵後漸長以至二丈毎吐涎于地人畜踐之即仆因就食之凡物開口皆動下頦此魚獨動上齶口中無舌冬月則不食物人見却走必逐而食之人返逐之彼亦却走其目入水則鈍出水極明見人逺則哭近則噬故西國稱假慈悲者為剌瓦而多哭獨有三物能制之一為仁魚盖此魚通身鱗甲惟腹下有輭處仁魚鬐甚利能刺殺之一為乙茍滿䑕屬也其大如猫善以泥塗身令滑俟此魚開口輙入腹嚙其五臓而出又能破壊其卵一為雜腹蘭香草也此魚最喜食蜜養蜂家四周種雜腹蘭即弗敢入有名落斯馬長四丈許足短居海底罕出水面皮甚堅用力刺之不可入額有二角如鈎寐時以角掛石盡日不醒昔西舶就一海島纜舟登島行逰復在島造作火食漸次登舟解維不㡬里忽聞起大聲回視所登之島已沒方知是一魚背有獸形體稍方其骨軟脆有翼能鼔大風以覆海舟其形亦大如島又有一獸二手二足氣力猛甚遇海舶輙顛倒播㺯之多遭沒溺稱為海魔其小者有飛魚僅尺許能掠水面而飛有狗魚善窺飛魚之影伺其所向先至其所開口待啖恒追數十里飛魚急輙上舟為人得之舟人以雞羽或白練飄揚水面上著利鈎狗魚認為飛魚躍起吞之為舟人所獲又有麻魚状極麄笨饑餓時潜于海底魚聚處凡魚近其身即麻木不能動因而食之倘人以手足近之亦必麻木又海蝦蟆産地中海與石同色餓時潜身石内鼻吐一紅線如小蚯蚓以餌小魚衆魚誤以為石内小蟲羣争食之咸入其口西紅海内産風魚可以占風國人晒乾掛于房内以其身首所向即為風起之方有介屬之魚僅尺許有殻六足足有皮如欲他徙則豎半殻當舟張足皮當帆乗風而行名曰船魚有蟹大踰丈許其螯以箝人首人首立斷箝人肱人肱立斷其殻覆地如矮屋然可容人卧有海馬其牙堅白􅉷浄文理細如絲髪可為念珠等物復有海女上體是女下體為魚形其骨為念珠等物可止下血二者皆魚骨中上品各國貴重之海鳥有二種一宿島中者日常飛颺海面海舶遇之可占海島逺近一生長海中不知登岸舶上欲取之以皮布水面以鈎著餌置皮上鳥就食輙可鈎至若釣魚然有鳥能捕魚者身生皮囊如網入水裹魚而出人因取之又有極異者為海人有二種其一通體皆人鬚眉畢具特手指畧相連如鳬爪西海曽捕得之進于國王與之言不應與飲食不嘗王以為不可狎復縱之海轉盼視人鼓掌大笑而去二百年前西洋喝蘭逹地曽于海中獲一女人與之食輙食亦肯為人役使且活多年見十字聖架亦能俯伏但不能言其身有肉皮下垂至地如衣袍服者然但著體而生不可脫卸二者俱可登岸第不識其性情莫測其族類又不知其在海宅于何所似人非人良可怪海産海産以明珠為貴則意蘭最上土人取海蚌置日中晒之俟其口自開然後取珠則珠鮮白光瑩有大如雞子者光照數里南海皆剖蚌出珠故珠色黯無光有珊瑚島其下多珊瑚初在海中色緑而質軟上生白子土人以鐵􅃠取之出水便堅有紅黒白三色紅者堅而密白黒者鬆脆大浪山東北有暗礁水涸礁出悉是珊瑚猫睛寳石各處不乏小西洋更多琥珀則歐邏巴波羅尼亞有之沿海三千里皆是因風浪所湧堆積此地龍涎香黒人國與伯西兒兩海最多有大塊重千餘斤者望之如島毎為風濤湧泊于岸諸蟲鳥獸並喜食之海舶海舶百種不止約有三等小者僅容數十人用以傳書信不以載物其腹􅆰虚自上逹下惟留一孔四圍㸃水不漏下鎮以石一遇風濤不習水者盡入舟腹密閉其孔塗以瀝青使水不進操舟者縛其身于檣桅任水飄蕩其腹􅆰虚永不沉溺船底有鎮石亦不翻覆俟浪平舟人自解縛萬無一失一日可行千里中者容數百人自小西洋以逹廣東則用此舶其大者上下八層高約八丈最下一層鎮以沙石千餘石使舶不傾側震盪二三層載貨與食用之物海中得淡水最艱須装千餘大桶以足千人一年之用他物稱是上近地平板一層中下人居之或装細軟切用等物地平板外則虚百歩為揚帆習武㳺戲之地前後各建屋四層為尊貴者之居中有甬道可通頭尾尾建水閣為納凉以待貴者遊息舶兩旁列大銃數十門其鐵彈有三十餘斤重者上下前後有風帆十餘道桅之大者二十丈周一丈二尺帆濶八丈約需白布二千四百丈為之鐵猫重六千三百五十餘斤其纜繩周二尺五寸重一萬四千三百餘斤水手二三百人将卒銃士三四百人客商數百有舶總管貴官一員是西國國王所命以掌一舶之事有賞罰生殺之權又有舶師三人通天文二士舶師專掌候風使帆整理器用吹號頭指使夫役探試淺水礁石以定趨避通天文士専掌窺測天文晝測日夜測星用海圖量取度數以識險易知里道又有官醫主一舶疾病有市肆貿易食物大舶不畏風浪獨畏山礁淺沙又畏火舶上火禁極嚴千人之命攸係其起程但候風色不選擇日時亦未嘗有大失若多舶同走大者先行引路舶後尾樓夜㸃燈籠照視燈籠周二丈四尺高一丈二尺皆玻璃板凑成行海晝夜無停有山島可記者指山島行至大洋中萬里無山島則用羅經以審方審方之法全在海圖量取度數即知舶行至某處離某處若干里瞭如指掌墨瓦蠟泥加州為南極周圍大地從古航海者未曽通進其内地未獲知其人物風俗山川畜産鳥獸魚蟲等何如故懐仁所鐫坤輿圖至南極周圍􅆰地内惟繪天下四州異獸竒物數種之像而已亞細亞州𤓰哇島等處有無對鳥無足腹下生長皮如筋纒于樹枝以立身毛色五彩光耀可愛不見其飲食意惟服氣而已亞細亞州印度國産獨角獸形大如馬極輕快毛色黄頭有角長四五尺其色明作飲器能解毒角銳能觸大獅獅與之鬬避身樹後若誤觸樹木獅反嚙之亞細亞州印度國剛霸亞地産獸名鼻角身長如象足稍短遍體皆紅黄斑㸃有鱗介矢不能透鼻上一角堅如鋼鐵将與象鬬時則于山石磨其角觸象腹而斃之亞細亞州如徳亞國産獸名加黙良皮如水氣明亮隨物變色性行最漫藏于草木土石間令人難以别識亞細亞州南印度國産山羊項生兩乳下垂乳極肥壮眼甚靈明歐邏巴州意大理亞國有河名巴鐸入海河口産般第狗晝潜身於水夜卧旱地毛色不一以黒為貴能嚙樹木其利如刀歐邏巴州意大理亞國有蜘蛛類名大懶毒辣凡螫人受其毒即如風狂或嬉笑或跳舞或仰卧或奔走其毒中人氣血比年必發療其疾者依各人本性所喜樂音解之歐邏巴東北里都瓦你亞國産獸名獲落身大如狼毛黒光潤皮甚貴性嗜死屍貪食無厭飽則走入稠密樹林夾其腹令空仍覔他食歐邏巴州熱爾瑪尼亞國獸名撒辣漫大辣産於冷濕之地性甚寒皮厚力能滅火毛色黒黄間雜背脊黒長至尾有斑㸃利未亞州額第約必牙國有狸猴獸身上截如狸下截如猴色如瓦灰重腹如皮囊遇獵人逐之則藏其子于皮囊内窟于樹木中其樹徑約三丈餘利未亞州東北厄日多國産魚名喇加多約三丈餘長尾堅鱗甲刀箭不能入足有利爪鋸牙滿口性甚獰惡色黄口無舌唯用上齶食物入水食魚登陸毎吐涎于地人畜踐之即仆因就食之見人逺則哭近則噬冬月則不食物睡時嘗張口吐氣有獸名應能滿潜入腹内嚙其肺膓則死應能滿大如松鼠淡黒色國人多畜之以制焉利未亞州多獅為百獸王諸獸見皆匿影性最傲遇者亟俯伏雖餓時不噬千人逐之亦遲行人不見處反任性疾行畏雄雞車輪之聲聞則逺遁又最有情受人徳必報常時病瘧四日則發一度病時躁暴猛烈人不能制擲以毬則騰跳轉㺯不息利未亞州有獸名意夜納形色皆如大狼目睛能變各色夜間學人聲音喚誘人而啖之利未亞州西亞毘心域國産獸名惡那西約首如馬形前足長如大馬後足短長頸自前蹄至首高二丈五尺餘皮毛五彩芻畜囿中人視之則從容轉身若示人以華彩之狀亞墨利加州白露國産雞大于常雞數倍頭較身小生有肉鼻能縮能伸鼻色有稍白有灰色有天青色不等惱怒則血聚于鼻上變紅色其時開屏如孔雀渾身毛色黒白相間生子之後不甚愛養須人照管方得存活南亞墨利加州智勒國産異獸名蘇其尾長大與身相等凡獵人逐之則負其子于背以尾蔽之急則吼聲洪大令人震恐南亞墨利加州伯西爾喜鵲吻長而輕與身相等約長八寸􅆰明薄如紙此地蛇大無目盤旋樹上凡獸經過其旁聞氣即𦂳縛之于樹間而食南亞墨利加州駱駝鳥禽中最大者形如鵞其首高如乗馬之人走時張翼状如棚行疾如馬或謂其腹甚熱能化生鐵海中有飛魚僅尺許能掠水面而飛狗魚善窺其影伺飛魚所向先至其所開口待啖恒追數十里飛魚急輙上舟為舟人得之大東海洋産魚名西楞上半身如男女形下半身則魚尾其骨能止血病女魚更效把勒亞魚身長數十丈首有二大孔噴水上出勢若懸河見海舶則昻首注水舶中頃刻水滿舶沉遇之者以盛酒鉅木甖投之連吞數甖俛首而逝劍魚嘴長丈許有齬刻如鋸猛而多力能與把勒亞魚戰海水皆紅此魚輙勝以嘴觸船則破海舶甚畏之海舶廣大容載千餘人風帆十餘道約二千四百丈布為之桅高二十丈鐵猫重六千三百五十餘斤纜繩重一萬四千三百餘斤其詳見前海舶說終篇七竒圖說上古製造宏工紀載有七所謂天下七竒是也一亞細亞州巴必鸞城瑟彌辣米徳王后創造京都城池形勢矩方毎方長五十里周圍計二百里城門通共一百皆浄銅作成城高十九丈濶厚四丈八尺用美石砌成城樓上有園囿樹木景致接山水湧流如小河然造工者毎日三十萬二銅人巨像樂徳海島銅鑄一人高三十丈安置于海口其手指一人難以圍抱兩足踏兩石臺跨下高曠能容大舶經過右手持燈夜間㸃照引海舶認識港口叢泊銅人内􅆰通從足至手有螺旋梯升上㸃燈造工者毎日千餘人作十二年乃成三利未亞洲厄日多國孟斐府尖形高臺多禄茂王建造地基矩方毎方一里周圍四里臺高二百五十級毎級寛二丈八尺五寸高二尺五寸皆細白石為之自基至頂計六十二丈五尺頂上寛容五十人造工者毎日三十六萬四亞細亞洲嘉畧省茅索禄王塋墓亞爾徳彌細亞王后追念其夫王建造塋墓下層矩方四面各有貴美石柱二十六株穿廊圓拱各寛七丈餘内有石梯至頂頂上銅輦一乗銅馬二疋茅索禄王像一尊其竒異一在製度二崇高三工精四質料純細白石築造将畢王后憶念其夫王悵悶而殂五亞細亞洲厄弗俗府供月祠廟𢎞麗竒巧基址建在湖中以免地震催倒高四十四丈寛二十一丈内有細白石柱共一百五十七株各高約七丈廟内甚多細石絶巧人像廟外四面各有橋梁一道以通四門橋最寛濶細白石作成正門前安置美石精工神像築工者至二百二十年乃成六歐邏巴洲亞嘉亞省供木星人形之像斐第亞天下名工取山中一塊最硬大石彫刻木星人形之像身體宏大工精細巧安坐廟中時有譏笑者對工師曰設使這宏大之軀起立豈不冲破廟宇乎工師答曰我已安置之萬不能起立七法羅海島高臺厄日多國多禄茂王建造崇隆無際高臺基址起自丘山細白石築成頂上安置多火炬夜照海艘以便認識港涯叢泊古時七竒之外歐邏巴州意大理亞國羅瑪府營建公樂塲一埏體勢撱圓形周圍樓房異式四層高二十二丈餘俱用美石築成􅆰塲之徑七十六丈樓房下有畜養諸種猛獸多穴于公樂之時即放出猛獸在塲相鬬觀看者坐團圓臺級層層相接高出數丈能容八萬七千人座位其間各有行走道路不相逼碍此塲自一千六百年来至今現存坤輿圗說卷下
