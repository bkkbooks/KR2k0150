body:
  text: 坤輿圖説卷上欽天監監正南懷仁撰坤輿圖説者乃論全地相聯貫合之大端也如地形地震山岳海潮海動江河人物風俗各方生産皆同學西士利瑪竇艾儒畧髙一志熊三拔諸子通曉天地經緯理者昔經詳論其書如空際格致職方外紀表度説等已行世久矣今撮其簡畧多加後賢之新論以發明先賢所未發大地之真理夫地與海本是圓形而合為一球居天球之中誠如雞子黄在青内有謂地為方者乃語其定而不移之性非語其形體也天既包地則彼此相應故天有南北二極地亦有之天分三百六十度地亦同之天中有赤道自赤道而南二十三度半為南道赤道而北二十三度半為北道按中國在赤道之北日行赤道則晝夜平行南道則晝短行北道則晝長故天球有晝夜平圏列於中晝短晝長二圏列於南北以著日行之界地球亦設三圏對於下焉但天包地外為甚大其度廣地處天中為甚小其度狹此其差異者耳查得直行北方者每路二百五十里覺北極出髙一度南極入低一度直行南方者每路二百五十里覺北極入低一度南極出髙一度則不特審地形果圓而並徵地之毎一度廣二百五十里則地之東西南北各一週有九萬里實數也是南北與東西數相等而不容異也夫地厚二萬八千六百三十六里零百分里之三十六分上下四旁皆生齒所居渾淪一球原無上下葢在天之内何瞻非天總六合内凡足所佇即為下凡首所向即為上其專以身之所居分上下者未然也且予自大西浮海入中國至晝夜平線已見南北二極皆在平地畧無髙低道轉而南過大浪山已見南極出地三十五度則大浪山與中國上下相為對待矣而吾彼時只仰天在上未視之在下也故謂地形圓而週圍皆生齒者信然矣以天勢分山海自北而南為五帶一在晝長晝短二圈之間其地甚熱帶近日輪故也二在北極圏之内三在南極圈之内此二處地居甚冷帶逺日輪故也四在北極晝長二圏之間五在南極晝短二圏之間此二地皆謂之正帶不甚冷熱日輪不逺不近故也又以地勢分輿地為五大州曰歐邏巴曰利未亞曰亞細亞曰南北亞墨利加曰墨瓦蠟泥加若歐邏巴者南至地中海北至青地及氷海東至大乃河墨阿的湖大海西至大西洋若利未亞者南至大浪山北至地中海東至西紅海聖老楞佐島西至阿則亞諾海即此州只以聖土之下㣲路與亞細亞相聯其餘全為四海所圍若亞細亞者南至蘇門荅喇吕宋等島北至新増白臘及北海東至日本島大清海西至大乃河墨阿的湖大海西紅海小西洋若亞墨利加者全為四海所圍南北以㣲地相聯若瑪熱辣泥加者盡在南方惟見南極出地而北極恒藏焉其界未審何如故未敢訂之惟其北邊與爪哇及瑪熱辣泥峽為境也其各州之界當以五色别之令其便覽各國繁夥難悉原宜作圓球以其入圖不便不得不易圓為平反圏為線耳欲知其形必須相合連東西二海為一片可也其經緯線本宜每度畫之今且惟每十度為一方以免雜亂依是可分置各國于其所天下之緯自晝夜平線為中而起上數至北極下數至南極天下之經自順天府起為初度至三百六十度復相接焉試如察得福島離中線以上二十八度離順天府以東二百十五度則安之于所也凡地在中線以上至北極則實為北方凡在中線以下則實為南方焉又用緯線以著各極出地幾何葢地離晝夜平線度數與極出地度數相等但在南方則著南極出地之數在北方則著北極出地之數也假如視京師隔中線以北四十度則知京師北極髙四十度也視大浪山隔中線以南三十五度則知大浪山南極髙三十五度也凡同緯之地其極出地數同則四季寒暑同態焉若兩處離中線度數相同但一離于南一離于北其四季並晝夜刻數均同惟時相反此之夏為彼之冬耳其長晝長夜離中線愈逺則其長愈多余為式以記于圖邊每五度其晝夜長何如則東西上下隔中線數一則皆可通用焉用經線以定兩處相離幾何辰也葢日輪一日作一週則每辰行三十度兩處相離三十度並謂差一辰假如山西太原府列在于三百五十五經度而則意蘭島列于三百二十五經度彼此相去三十度則相差一辰故凡太原為午則意蘭為已其餘倣此焉設差六辰則兩處晝夜相反焉如所離中線度數又同而差南北則兩地人對足底反行假如河南開封府離中線以北三十四度而列在于三百五十七經度又南亞墨利加之内近銀河之地如趙路亞斯等離中線以南三十四度而列于一百七十七經度彼此相去一百八十度即六辰則彼此相對反足底行矣從此可曉同經線處並同辰而同時見日月蝕焉夫地圖所定各方之經緯度多歴年世愈久而愈凖葢其定法以測驗為主當其始天下大半諸國地及海島不可更僕前無紀録之書不知海外之復有此大地否也近今二百年來大西洋諸國名士航海通遊天下週圍無所不到凡各地依厯學諸法測天以定本地經緯度是以萬國地名輿圖大備如此其六合之地及山川江河湖海島嶼原無名稱凡初歴其地者多以前古聖人之名名之以為别識而定其道里云地體之圜世謂天圜而地方此葢言其動静之義方圓之理耳非言其形也今先論東西次論南北以證合地圜之㫖日月諸星雖每日出入地平一遍第天下國土非同時出入葢東方先見西方後見漸東漸早漸西漸遲如第一圖午酉子夘為日天甲乙丙丁為地球令日輪在午而人居甲即日正在其天頂得午時人居丙即得子時日在其天頂衝也東去甲九十度居丁得酉時日既過其天頂將沒于地則午甲丙子為其地平也西去九十度居乙即得卯時日向其天頂方出于地亦甲午丙子為其地平也依此推算今日輪出地平在夘人居丁得午時居乙得子時矣此何以故地為圜體故日出于卯因甲髙與乙障隔日光不照故丁之日中乙之半夜也若地為方體者如上甲乙丙丁則日出夘凡甲乙丁地面人宜俱得夘日入酉宜俱得酉不應東西相去二百五十里而差一度又七千五百里而差一時也故明有時差者不能不信地圜也又丁乙與甲異地即異天頂即異日中而又與甲同卯酉即丁之午前短午後長矣乙之午前長午後短矣獨甲得午前後平耳而今半晝分天下皆同何也則明有半晝分者不能不信地圜也自南而北地為圜體亦可推焉如第三圖西南東北為周天甲乙丙為地之圜球丁戊巳為地之方面若人在圓球之乙即見在南諸星從乙漸向丙即南諸星漸隠矣漸向甲者反是若人在平面之丁即得俱見南北二極之星其在戊在巳亦如南北極諸星何由得漸次隠見乎則地之為圜體固可證矣地圜又地周三百六十度毎度二百五十里其周圍實獨有九萬里令地為方四面其一面應得二萬二千五百里人居一面地平之上其二萬二千五百里之内並宜見之乃今目力所及大畧能見三百里即于最髙山上未有能見四五百里者則地之圜體突起于中能遮兩界故也地水同為一圜球以月食之形可推而明之夫月食之故由大地在日月之間如上圖日不能施照于月故地射影于月面亦成圓形則地為圜可知或言果大地如圜球則四旁在下國土窪處之海水不知何故得以不傾云云曰物重者各有體之重心此重心者在重體之中地中之心為諸重物各重之本所物之重心悉欲就之凡謂下者必逺于天而就地心凡謂上者必就天而逺于地心而地之圜球懸于空際居中無著常得安然而四方土物皆願降就于地心之本所東降欲就其心而遇西就者不得不止南降欲就其心而遇北就者亦不得不止凡物之欲就者皆然故凡相遇之際皆能相衝相逆而凝結于地之中心即不相及者以欲就故亦附離不脱致令大地懸居空際也如上圖丙為地中心甲乙兩分各為之半球甲東降就其心乙西亦降就其心兩半球又各有本體之重心如丁如戊甲東降必欲令本體之重心丁至丙中心然後止乙西降必欲其本體之重心戊至丙中心然後止故兩半球相遇于丙中心甲不令乙得東乙不令甲得西一衝一逆力勢均平遂兩不進亦兩不退而懸居空際安然永奠矣譬一門焉二人出入在外者衝欲開之在内者逆欲閉之一衝一逆為力均平門必不動甲乙半球其理同也至四方八面一塵一土莫不皆然地道隤然而下凝職是故耳地球南北兩極必對天上南北兩極不離天之中心夫地中心為諸天之中心從月食之理而明之新法厯書有本論其地球南北兩極正對天上南北兩極而永逺不離者從本極之髙度明見之蓋天下萬國從古各有所測本地南北極之髙下度于今之所測者不異其不離天極之所以然在萬物變化之功蓋天下各地萬物生長變化之功皆原太陽及諸星循四時之序照臨而成也在各國之地平上下髙卑若干因而剛柔燥濕隨之而萬物各得其宜耳今使地之兩極不必其為向天上之兩極而離之或于上下或于左右則是天下萬國必隨之而紛擾動搖將原在乎赤道之北者忽易而為赤道之南赤道之南者忽易而為赤道之北近者變逺逺者變近夏之熱忽變乎冬之寒則四序顛倒生長變化之功因之大亂而萬物滅絶矣審乎此則地之南北兩極恒向乎天之兩極亘萬古而不移也夫何惑焉即使地有偶然之變因動而離于極則地亦必即自具轉動之能以復歸于本極與元所向天上南北之兩極焉夫地球自具轉動之力與吸銕石之力無二吸銕石之力無他即向南北兩極之力也葢吸銕石原為地内純土之類故其本性之氣與大地本性之氣無異所謂純土者即四元行之一行並無他行以雜之也夫地上之淺土雜土為日月諸星所照臨以為五穀百果草木萬彚化育之功純土則在地之至深如山之中央如石鐵等礦是也審此則夫地球之全體相為葆合葢有脉絡以聯貫于其間焉嘗考天下萬國名山及地内五金礦大石深礦其南北陡衺面上明視毎層之脉絡未有不從下至上而向南北之兩極者也仁等從逺西至中夏歴九萬里而遥縱心流覽凡于瀕海陡袤之髙山察其南北面之脉絡夫槩皆向南北兩極其中則另有脉絡與本地所交地平線之斜角正合本地北極在地平上之斜角五金石礦等地内深洞之脉絡亦然凡此脉絡内多有吸鐵石之氣又嘗考天下萬國堪輿諸書圖五大洲凡名山大川皆互相綿亘至幾千萬里之遥自南而北逶迤繡錯其列于地者顯而可見也其内之脉絡蟬聯通貫即何殊乎人身之脉絡骨節縱横通貫而成其為全體也哉地震或問地震曷故曰古之論者甚繁或謂地含生氣自為震動或謂地體猶舟浮海中遇風波即動或謂地體亦有剝朽乃剝朽者裂分全體而墜于内空之地當墜落時無不搖動全體而致聲響者又有謂地内有蛟龍或鼇魚轉奮而致震也凡此無稽之言不足深辯惟取理之至正者而姑論其數端及其性情之自然者如左其一地震者因内所含熱氣所致也葢地外有太陽恒照内有火氣恒燃則所生熱氣漸多而注射于空隙中是氣愈積愈重不能含納勢必奮怒欲出乃猝不得路則或進或退旋轉鬱勃潰圍破裂而出故致震動且有聲響也正如火藥充實于礮銃内火一燃而衝突奮裂乃必破諸阻礙而發大響也或疑氣似不能動地須知氣之力堅猛莫禦試觀夫風初亦莫非㣲氣所發積而至于走石拔樹頽屋覆舟夫氣之困鬱于地其奮發必力奮而震搖乎地體理之自然者也何足異哉欲證其所由然則有二端可以明之一震之時率在春秋之月葢因此二時氣最易生也一震之所必在土理疎燥及多空窟之地以其易容多氣故山崩之處内多洞穴者其震猶更宻也若地有空竅向天而可以噓散所藴之氣者則終不致震耳又海中之島亦多震者因外圍之海水與内所含之硝磺多致生熱氣熱氣既熾必發震也所以本土之人毎多掘井欲其氣透而易散以免地震故也大凡地震之或先或後必久屬亢旱或并多風肆暴而致總之氣之為烈耳其氣為烈之故則有三焉其一凡地内之有空洞氣既充盈而又生新氣以増益之勢難並容不勝其鬱勃而奮力求出故致震撼也其二凡地被寒氣侵閼必自收縮乃致其内所含熱氣自為流遁而遂亂相衝擊其地也其三地内所藏熱氣一被外之冷氣侵閼則必退而斂約斂約愈極其力愈長而質愈稀清愈稀清亦愈欲舒放而得廣所斯乃搖動觸震地體也夫震之久暫首係氣勢凡氣之厚且多者緩消薄與寡者速散次係地勢凡地之疎輭者易開宻且硬者難出因其久為衝奮或連或㫁而復續竟致久動矣其實一動非能久也凡致地震之烈氣積在地内不過數十百丈之深則遇低窪之處如江海山谷等易出而散因而震動不越一郡縣或一山谷之地而止若猛烈之氣藏于地内至數十百里之深則既難發洩必致四面衝奮尋其所出之路因而震數省之地致數千里之逺也山岳先聖論地初受造時甚圓無深淺髙卑之殊惟水徧圍其面而已但造物者將居民物于地面則開取淵坎令水歸之致露乾土即以所取之土致成山岳陵阜之類試觀海涯無不倚山陵之足江河多峽于阜嶺之中大約髙山多近深谷可以驗其原生之意也然造成後又有變遷葢諸國典籍所記髙岸為谷深谷為陵古所未有者或新發而始見是乃地震所致或風力或水勢所成也若究其山生之為者不但飾地之觀豎地之骨直于人物有多益焉葢或以毓五金或以捍四海或以湧溪澤或以茂林叢或以蔽風雪或以障䕃翳或以界封疆或以禦冦盜或以闢飛走之囿或以廣藏修之居無算妙用則造物之原㫖以全夫寰宇之美而備生民之須耳今摘天下各國有名髙山里數開列于左阨勒齊亞國阨莫山髙十三里一百九十二丈西齊理亞國晝夜噴火之山名阨得納髙十三里一百五十六丈西洋徳納里法島必个山髙二十一里二百一十四丈阨勒齊亞國亞多山髙二十四里一百零四丈意大里亞國呀爾伯山髙二十七里一百六十八丈諾爾物西亞國山髙三十里零二十丈亞墨尼加洲伯納黒山髙五十五里一百二十丈莫斯哥未亞國里弗依山髙八十三里零七十二丈亞細亞洲髙架所山髙一百三十一里二百零四丈海水之動海水自然之動止有其一即下動也凡外動為强則非自然可知矣其强動甚多其一外風所發風既不一動亦不一其二自東而西凡從歐邏巴航海西向而行則順而速東向而行則逆而遲此動非特大海又于地中海可見其所以然從太陽自西而東行以生焉見風氣説其三自北而南凡航海者從北向南必順而速從南而北必逆而遲夏月行北海者常見氷塊之廣大如城如海島曽有見長三百餘里者從北而南流其所以然者北極相近之海大寒比年中多雲雨多氷雪與赤道相近之海大熱毎日海水之氣甚多被日薫蒸沖上空際葢南海之勢處卑北海之勢處髙故水北而南流也海之潮汐潮汐各方不同地中海迤北迤西或悉無之或㣲而難辨迤南迤東則有而大至于大滄海中則隨處皆可見也第大小速遲長短各處又不同近岸見大離岸愈逺潮愈㣲矣地中海潮水極㣲又吕宋國莫路加等處不過長二三尺若其他如大西拂蘭第亞國潮水長至一丈五尺亦有一丈八尺至二丈之處安理亞國隆第諾府現長至三丈其國之他處長至五六丈阿利亞國近滿直府長至七丈近聖瑪諾府間長至九丈此各方海潮不同之故由海濱地有崇卑直曲之勢海底海内之洞有多寡大小故也况月之照海各方不同則其所成功亦不能同其長退之度或毎以三候或長以四候或其長極速即騎馳猶難猝脱則一候倐淹覆四百餘里而又一候倐歸本所又始起長之時亦不同大槩毎日遲約四刻朔望所長更大嘗推其故而有得于古昔之所論者則以海潮由月輪隨宗動天之運也古今多宗之其正驗有多端一曰潮長與退之異勢多隨月顯隠盈虧之勢葢月之帶運一晝夜一周天其周可分四分自東方至午自午至西自西至子復自子至東而潮一晝夜槩發二次卯長午消酉長子消若隨處隨時略有不同是不足為論别有其所以然也二曰月與日相㑹相對有近逺之異勢亦使潮之勢或殊假如望時月盈即潮大月漸虧而潮漸小三曰潮之發長每日遲四刻必由于月每日多用四刻以成一週而返原所葢月之本動從西而東一日約行十三度從宗動天之帶動自東而西必欲一日零四刻方可以補其所逆行之路而全一週也四曰冬時之月多强于夏時之月故冬潮槩烈于夏潮五曰凡物屬隂者概以月為主則海潮既由濕氣之甚無不聽月所主持矣即月所以主持海潮者非惟光也葢朔㑹時月之下面無光至與吾對足之地亦無光海當是時猶然發潮不息則知月尚有他能力所謂隠徳者乃可通逺而成功矣是月以所借之光或所具之徳致使潮長也如磁石招鐵琥珀招芥然或生多氣于海内使其發潮也如火使鼎水沸溢然或問潮汐之為理者何也曰一則以免腐朽之患葢水久注必朽一則以清外聚之垢蓋地上丕惡之積由江河而歸于海乃潮長復發吐之也一則以輔航漂渡之事蓋潮長則從海易就岸潮退則從岸易入海觀此則海潮之益不淺矣造物主豈無意乎或問海水之鹹曷故曰多由于乾濕二氣之滲証曰凡滋味必從二氣之雜乃乾而甚燥必生鹹如灰溺汗等是也則海既含多氣或風從外至或日從内生故其水不能不鹹也試用海水濯物必溫和乾燥較諸他水為濁其沾濡如油何也其含土之乾氣故也又試觀海水或流沙内或被火蒸必甘何也失土氣之大分故也又試取浮薄空器塞口沉于海中其内所浸入之水必甘因水從㣲孔入少帶土氣故也又從海氣聚結之雨必甘何也氣上時其土之濁多墜失故也觀此多端海水之鹹從土極乾燋之氣而生也明矣雖然太陽之亢炎亦能致鹹驗之海面之水鹹甚于海底者近受日暈之射而底之水日光不及故也又試之夏月海水多鹹于冬月葢日軌甚近之所使然矣江河夫地内多藏積水常見鑿礦者多遇池瀆及速㳅之澗又隨處掘井者或淺或深無不得水之源又觀乾地屢開竅發水而或成湖澱或淹房屋人物也因知地中非函大積之水定無是事也又造物者初收水于深淵時遺多分于地内又隨處開闢匿空隠渠以徧運潤澤之恩正如人體内多備脉絡筋骨以運血氣之潤澤也葢地原本至乾非得水之潤自難凝結又不能養育卉木金石之類濟捄人物之用因知天地造成之初地面即多發泉川江湖以備後用夫江河溪泉多由于海水証以四端一曰天下江川日日入海而不溢者必有他出若無出而不溢極難解矣二曰江河之洪大者非源于海更無此大源矣葢地内從氣所變之水萬不足供大江之常流也三曰從古嘗有江湖泉川新出其味如海之鹹其魚亦如海内之形則江河非由于海而何四曰凡近海之地必多泉川愈逺于海者其川亦愈寡矣又江河雖多從海而出但泉川亦有從氣變生者葢地中所藏多氣既不能出外又被圍山之冷攻之因漸變渙而滴流致成泉溪之永源試觀最髙之山大都有永泉甚甘甚冽然海水或相去甚逺其地或甚低其水又濁且鹹又何能致甘冽乎又觀人屋近于山麓閉其户牖必多濕而發水何也其内藏之氣易變水也矧山穴之内乎又入山中諸洞等旁多滴水成水渚乃溪澗之永源備矣或問海卑地崇水何能逆本性上流于地面乎曰海水所由之匿空隠渠必曲非直乃水因潮長時强入其内不能復退惟有漸進勢不得不上湧矣况星辰之隠徳必招攝海水以滋萬物而土為極乾又招水以自慰其渇因濟外物之須則水之上流也觀其私性為逆觀衆物之公性則不為逆也正如凡遇空時水土必上火氣必下而是上下之動者論各元行之性為逆論衆物之性不逆是也天下名河亞細亞洲黄河元朝圖史載黄河本東北流歴西蕃至蘭州凡四千五百餘里始入中國又東北流過夷境凡二千五百餘里始轉河東又南流至蒲州凡一千八百餘里通計屈曲九千餘里歐拂辣得河長六千里其流入海口處濶四十八里安日得河長四千八百里濶約五里深十丈餘分七岔入海及水産金沙阿被河長七千二百里此河開凍時有大氷如山岳衝擊樹木排至兩岸旁溢一千二百里土人遷移入山避之印度河長四千里入海口處濶一百六十里歐邏巴洲大乃河長二千四百八十里分三岔入墨阿的湖窩耳加河長一千六百里分七十二流入海達乃河長四千八百里入大海多惱河長三千六百里分七岔入海其河有橋長一十一里髙十五丈利未亞州泥琭河長八千八百里分七流入海産葛爾各第羅蛇及海馬黒河地内藏其水道至二百四十里逺有餘北亞墨利加加納大河海潮入此河至一千六百里流入海口處濶二百四十里南亞墨利加聖瑪得勒納河長三千六百里巴里亞河深十五丈入海口處濶四百四十餘里雅瑪瑣農江長一萬餘里濶八十四里深不可測入海口處濶三百三十六里其水勢悍急直射海水至三百二十餘里皆甜水其兩岸綿亘有一百三十餘國語言風俗俱不同氣行古或以氣無色不屬五外司疑為無有此説大謬可証者有六一曰無氣則天内空矣地何以懸空而得居于中萬物何以得生日月星辰何以得外光或以隠徳養育萬生乎葢物惟聯統庶得相濟相保空虚是所大忌避也二曰禽鳥無所賴則不能飛飛者以翼御氣如人用手御水而得浮也三曰風寂時人急趨走則前面若有物觸之者然是非氣而何四曰人向空中揮鞭定有聲響凡彈射皆然夫聲從二物相擊而生若空中非有氣必無他物以生聲矣五曰一室之中兩門相對開閉此一門則彼一門亦動又人在室中急行其窓之紙及諸係懸之輕物亦動非由氣而何六曰室中寂静無風見隙影内塵埃滚滚上下所謂野馬者何也必氣使之然矣數端不足証有氣乎至其變幻莫測則因小大應感之不倫耳非難明也氣惟實有而萬不可無一則以資喘息之功一則以運天光物像及人物聲音之跡一則以存火水等類之性葢氣一缺則人物之呼吸遂輟而内心火及其生機并滅又上天所射之光形物所發之像諸體所出之聲無所憑據無由至于所當至而資存其所包含内物之體也若言氣無色體可見遂謂之無則彼風聲臭味及鬼神人物之魂諸不屬人目者悉當謂之無乎夫外目所不及者有理之内目可及也夫氣厚分有上中下三域上域近火近火常熱下域近水土水土常為太陽所射足以發煖故氣亦煖中域上逺于天下逺于地則寒各域之界由何而分以絶髙山為界上為上域風雨所不至氣甚清人物難居下為中域雨雪所結自此以下為下域矣第其寒煖之分處又有厚薄不等若南北二極之下因逺太陽則上下煖處薄中寒處厚若赤道之下因近太陽則上下煖處厚中寒處薄以是知氣域之不齊也風夫風之本質乃地所發乾熱之氣有多端可證一試春秋時多風何也是時空際多聚乾熱之氣二曉晨時多風何也日出而升必攝多氣三雪化時多風何也雪内多有乾氣是氣將分别于冷濕故生風四空際忽見火色知後必有風何也火者乾熱之氣所致也五風愈大而物愈燥何也風之元質乾熱故也由是可知空際之氣雖動時或生風亦能如風之清涼人物然其實與風不同則風之元質多屬乾氣而乾氣中或亦有濕氣參之故春時之風與海上之風多致物朽可以為驗大海中黄道之下恒有東風故船往西行者必宜順風則行而疾如東行則逆風而遲葢太陽從冬至迄夏至輪轉恒行黄道下而其爆煖不絶照于空際正對之氣令之沖上然其故恒隨太陽從東而西則東邊之風氣必後隨之而恒補前氣之缺矣大海之水亦然恒隨太陽從東而西葢太陽西行無一息之停以其爆熱恒照而吸西海之水氣令之上沖而成雲霧因而在西之水面比在東之水面恒卑葢東髙西卑則海水從東而西流以補其缺此自然之理也夫乾熱氣騰上至于中域為冷寒氣所扼既不得上而性輕又不得下則必致横飛也又其飛之速遲强弱由于氣之衆寡清濁及其上沖之力與勢也葢氣之沖上者疾急一值阻扼其退飛亦必速迅由是可知風飛時其前後左右之氣無不動而隨之者是以氣動為風者亦必有故也或問旋風何曰若上所論乾熱之氣入數雲内復各爆出適相撞結因各隨所向之地互相推逐以成旋輪譬之川水其急流時忽值山石阻遏無由可出即囘而為旋窩也又譬之諸風凡從廣濶之地歸入隘巷而無路可出必囘旋矣是風在平地值物多起在海中值舟多沉夫風有多利姑舉四端其一拂動近氣令就平和以利呼吸人與諸生緣此以免閉塞之傷葢近氣無風則積聚不散有傷生命故也其二帶雲成雨以滋内地葢内地氣㣲旋生旋滅力不足成雲雨之功惟大海廣受日照猛起濕熱之氣蓬蓬勃勃升至中域太陽返照光力不及之際遂乃變熱而涼先結成雲漸散成雨然使無風帶入内地則濕氣所成雲雨復歸初升原處何由利内地之人乎其三燥地所餘潮氣悦生動物速熟諸果其四助舟楫之力以通貨財以利天下是也雲雨雲乃濕氣之宻且結者也地水之氣被日爆煖沖至空際中域一遇本域之寒即棄所帶之熱而反元冷之情因漸凑密終結成雲則或薄而稀或厚而宻者又由于氣之乾濕清濁相勝之異勢也薄稀者輕浮易為風所撥散難以成雨是為枯瘠無益之雲若厚密者多含潤澤故易化雨而益物則雨無他乃施雨之雲耳凡初雨之時必濛濛而細漸而近地則其雨㸃愈大矣葢雨落時多細㣲雨㸃彼此相沾若下之路逺則相沾之更多而加重大故山頂比山根之雨㸃㣲小因雲離山頂近離山根逺故也又冬月比夏月雨㸃㣲小因冬月天冷時雲離地不逺夏天大暑日雲髙離地更逺然雲逺則雨㸃從上而下一路彼此相沾之多而加重大雲近則路短而相沾之雨㸃小雨雹時亦然若當時有大風雹子而横斜下其體更加重大葢横斜之路比正直之路更逺路逺則雹子相沾之多間有如彈丸大者若剖而細視之則灼見多小雹子沾于一處由此故也四元行之序並其形四元行不雜不亂葢有次第存乎其間故得其所則安不得其所則强及其强力已盡自復歸于本所焉本所者何土下而水次之火上而氣次之此定序也其故有三一曰重輕重愛卑輕愛髙以分上下重輕又有甚次之别因上之中有下下之中有上以分元行之四水輕于土氣重于火水在土之上氣在火之下然水以重言氣以輕言者較從其衆故也葢水對一土曰輕對二火氣曰重氣對一火曰重對二水土則曰輕也以是知水必下而不上氣必上而不下矣二曰和情葢情相和則近相背則逺假如乾冷成土濕冷成水土水以冷情相和故相近濕熱成氣濕冷成水水氣以濕情相和故亦相近乾熱成火濕熱成氣氣火以熱情相和故亦相近若背情之行相反則逺假如水冷而濕火熱而乾二情正背故以相逺問土火以乾情相和而極逺者以土火雖有相和之情重輕大異故權衡于二者之故可以定四行之序矣三曰見試葢四行之序目前易試也火發為焱常有從下至上尖殺之形西曰火形葢不能安下而奮力以上必向極髙是也氣偶入土水之中不得其安而欲上行在土為地震為山崩在水為漚為泡試强一毬至水底忽然突出是也水若騰在氣域必被强而不得安迨强力已盡自復歸于本所如成雨者以太陽薫蒸地濕為雲雲稀屬氣故輕而浮雲宻屬水故重而墜墜者復其本所也土入水必下至水底而後安夫四元行必圓其理有二一則宇宙之全正為一球球以天與火氣水土五大體而成天體既圜則四元行之皆為形圜也㫁然矣一則四行皆在月天之下相切若有他形則火形之上或方或尖而不圜必于月天之下未能相切以致有空闕為物性所不容矣四行之上既圜則其下亦然茍下有他形則周乎地者亦不圓矣地既無不圓則其相連之水與氣亦無不圓可知矣葢凡物必圓而後能存如方則易散而毁矣以故非特天地與四元行皆圓至于人物肢體及草木果實無不皆圜也即如滴水而必成珠此固物合以存不欲散而毁也人物天以下週圍大地無不有人居焉古者多疑赤道及南北二極下之地皆無人居葢以其甚暑甚寒故也然航海者毎週全地而驗之處處皆有人居足以知舊説之非是矣欲明其然則見于空際格致論中從東而西凡離赤道之南北一般逺之地則人物大同小異若其離赤道近逺大不同之地則人物亦隨之而大不同矣葢天下變化之功大槩從日月五星自東而西周天之運動而生其四元行之情如冷熱乾濕隨之而變然日月五星皆依黄道而行而黄道之平分在于赤道也普天之下人所公同者即靈性也其五倫規矩之繁簡法度之疎密禮貌之華朴雖有不同終無以出于理外者葢所同者其性而其所不同者則面貌及聲音也葢凡物傳類者如禽獸等容貌多相同獨人不然人各一貌皆可識别不但天下之廣如此即一國一方一家皆如此容貌聲音無二人全同者此其中有主宰天下者之大意存焉葢憑面貌以判彼此彛倫所係齊治攸闗原非細故假使人面皆同必至夫媍各不相識父子皆不能辨人各肆志任情姦宄叢生無所不至雖欲治得乎彼禽獸大率同類相似者豈非以其無彛倫齊治闗係故哉面貌異矣又復别以聲音葢以人目異等又或夜遇無從識認更有此以證佐之也云爾坤輿圖説卷上
